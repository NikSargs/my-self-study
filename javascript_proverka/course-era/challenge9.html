<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Challenge9</title>
</head>
<body>
  <script>
    
    let name = prompt("Write a color", "");
    
    if(name == "red" || name == "blue" || name == "yellow") {
      console.log(`You picked primary color: ${name}`);
    } else if (name == "orange" || name == "green" || name == "purple") {
      console.log(`You picked secondary color: ${name}`);
    } else {
      console.log("you picked no primary nor secondary color");
    }
    
  </script>
</body>
</html>
