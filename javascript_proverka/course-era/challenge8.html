<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Challenge8</title>
</head>
<body>
  <script>
    
    let name = prompt("write a number", "");
    
    if(name < 10) {
      console.log("You entered a number smaller than 10");
      for(let i = 0; i < 10; i++) {
        if(i == name) {
          console.log(`Here is ${i} <--- this is your number!`);
        }else {
          console.log(`Here is ${i}`);
        }
        
    }
    } else if (name > 9 ) {
      alert("You entered a big number");
    } else {
      alert("ERROR: you didn't write a number");
    }
    
  </script>
</body>
</html>
